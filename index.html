<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consulta Predial</title>
<script type="module">
  import { municipios } from './datosPredial.js';

  document.addEventListener("DOMContentLoaded", () => {
    const predialInput = document.getElementById("predial");
    const btnGeoPortal = document.getElementById("btnGeoPortal");
    const resultado = document.getElementById("resultado");

    // Función para obtener el municipio desde el código del predial
    function obtenerMunicipio(predial) {
      // Ejemplo simple: se toma los primeros 5 dígitos como código del municipio
      const codigoMunicipio = predial.substring(0, 5);
      return municipios[codigoMunicipio] || "Municipio no encontrado";
    }

    btnGeoPortal.addEventListener("click", () => {
      const numeroPredial = predialInput.value.trim();

      if (!numeroPredial) {
        alert("Por favor ingrese un número de predial.");
        return;
      }

      // Mostrar municipio
      const municipio = obtenerMunicipio(numeroPredial);
      resultado.textContent = `Municipio detectado: ${municipio}`;

      // Crear URL del Geoportal
      const url = `https://www.colombiaenmapas.gov.co/?module=catastral&npredial=${numeroPredial}`;
      
      // Abrir en nueva pestaña
      window.open(url, "_blank");
    });
  });
</script>
</head>
<body>
  <h2>Consulta Predial</h2>

  <label for="predial">Número de Predial:</label>
  <input type="text" id="predial" placeholder="Ingrese el número de predial">

  <button id="btnGeoPortal">Abrir en Geoportal</button>

  <p id="resultado"></p>
</body>
</html>
